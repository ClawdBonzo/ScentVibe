<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#222}
canvas{border-radius:180px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1024, H = 1024;

// === BACKGROUND: Deep dark with subtle radial gradient ===
const bgGrad = ctx.createRadialGradient(W/2, H*0.4, 50, W/2, H/2, W*0.7);
bgGrad.addColorStop(0, '#0F2027');
bgGrad.addColorStop(0.4, '#0A1620');
bgGrad.addColorStop(1, '#050A10');
ctx.fillStyle = bgGrad;
ctx.fillRect(0, 0, W, H);

// === GLOW ORBS ===
// Emerald glow top-center
const glow1 = ctx.createRadialGradient(W*0.5, H*0.28, 0, W*0.5, H*0.28, 280);
glow1.addColorStop(0, 'rgba(51,166,115,0.25)');
glow1.addColorStop(0.5, 'rgba(51,166,115,0.08)');
glow1.addColorStop(1, 'transparent');
ctx.fillStyle = glow1;
ctx.fillRect(0, 0, W, H);

// Gold glow bottom
const glow2 = ctx.createRadialGradient(W*0.5, H*0.85, 0, W*0.5, H*0.85, 200);
glow2.addColorStop(0, 'rgba(212,179,92,0.15)');
glow2.addColorStop(1, 'transparent');
ctx.fillStyle = glow2;
ctx.fillRect(0, 0, W, H);

// === PERFUME BOTTLE (centered, stylized) ===
const cx = W/2, bottleTop = H*0.18;

// Bottle cap
const capGrad = ctx.createLinearGradient(cx-40, bottleTop, cx+40, bottleTop);
capGrad.addColorStop(0, '#D4B35C');
capGrad.addColorStop(0.5, '#F0D88C');
capGrad.addColorStop(1, '#B8952E');
ctx.fillStyle = capGrad;
roundRect(ctx, cx-38, bottleTop, 76, 50, 8);
ctx.fill();

// Cap highlight
ctx.fillStyle = 'rgba(255,255,255,0.15)';
roundRect(ctx, cx-30, bottleTop+5, 20, 40, 4);
ctx.fill();

// Neck
const neckGrad = ctx.createLinearGradient(cx-18, 0, cx+18, 0);
neckGrad.addColorStop(0, 'rgba(51,166,115,0.4)');
neckGrad.addColorStop(0.5, 'rgba(51,166,115,0.6)');
neckGrad.addColorStop(1, 'rgba(51,166,115,0.3)');
ctx.fillStyle = neckGrad;
ctx.fillRect(cx-18, bottleTop+50, 36, 55);

// Main bottle body
const bodyTop = bottleTop + 105;
const bodyH = 480;
const bodyW = 280;

// Bottle body gradient (emerald to teal)
const bottleGrad = ctx.createLinearGradient(cx-bodyW/2, bodyTop, cx+bodyW/2, bodyTop+bodyH);
bottleGrad.addColorStop(0, '#2EAE6E');
bottleGrad.addColorStop(0.3, '#25956A');
bottleGrad.addColorStop(0.6, '#1A7A5C');
bottleGrad.addColorStop(1, '#0F5A45');
ctx.fillStyle = bottleGrad;
roundRect(ctx, cx-bodyW/2, bodyTop, bodyW, bodyH, 24);
ctx.fill();

// Bottle glass highlight (left edge)
const hlGrad = ctx.createLinearGradient(cx-bodyW/2, 0, cx-bodyW/2+60, 0);
hlGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
hlGrad.addColorStop(1, 'transparent');
ctx.fillStyle = hlGrad;
roundRect(ctx, cx-bodyW/2+8, bodyTop+15, 50, bodyH-30, 16);
ctx.fill();

// Bottle glass highlight (right subtle)
const hlGrad2 = ctx.createLinearGradient(cx+bodyW/2-40, 0, cx+bodyW/2, 0);
hlGrad2.addColorStop(0, 'transparent');
hlGrad2.addColorStop(1, 'rgba(255,255,255,0.05)');
ctx.fillStyle = hlGrad2;
roundRect(ctx, cx+bodyW/2-40, bodyTop+20, 30, bodyH-40, 12);
ctx.fill();

// Bottle outline
ctx.strokeStyle = 'rgba(255,255,255,0.08)';
ctx.lineWidth = 1.5;
roundRect(ctx, cx-bodyW/2, bodyTop, bodyW, bodyH, 24);
ctx.stroke();

// === AI SCAN LINES (horizontal across bottle) ===
for(let i = 0; i < 5; i++) {
    const y = bodyTop + 60 + i * 90;
    const scanGrad = ctx.createLinearGradient(cx-bodyW/2-20, y, cx+bodyW/2+20, y);
    scanGrad.addColorStop(0, 'transparent');
    scanGrad.addColorStop(0.2, 'rgba(51,230,150,0.15)');
    scanGrad.addColorStop(0.5, 'rgba(51,230,150,0.3)');
    scanGrad.addColorStop(0.8, 'rgba(51,230,150,0.15)');
    scanGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = scanGrad;
    ctx.fillRect(cx-bodyW/2-30, y, bodyW+60, 2);
}

// === SPARKLE DOTS (scattered around bottle) ===
const sparkles = [
    [cx-180, bodyTop+80, 4], [cx+170, bodyTop+120, 3],
    [cx-160, bodyTop+250, 3], [cx+180, bodyTop+300, 5],
    [cx-190, bodyTop+400, 3], [cx+160, bodyTop+60, 4],
    [cx-120, bodyTop-30, 2.5], [cx+130, bodyTop+450, 2.5],
];
sparkles.forEach(([x,y,r]) => {
    const sg = ctx.createRadialGradient(x,y,0,x,y,r*3);
    sg.addColorStop(0, 'rgba(212,200,140,0.9)');
    sg.addColorStop(0.5, 'rgba(212,200,140,0.3)');
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(x, y, r*3, 0, Math.PI*2);
    ctx.fill();
    // core
    ctx.fillStyle = '#F0E6B0';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
});

// === "S" LETTER ON BOTTLE (brand mark) ===
ctx.save();
ctx.font = 'bold 160px "Georgia", serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
// Shadow
ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.fillText('S', cx+3, bodyTop + bodyH*0.42 + 3);
// Letter
const letterGrad = ctx.createLinearGradient(cx, bodyTop+bodyH*0.3, cx, bodyTop+bodyH*0.55);
letterGrad.addColorStop(0, '#F0E6B0');
letterGrad.addColorStop(0.5, '#D4B35C');
letterGrad.addColorStop(1, '#A8882A');
ctx.fillStyle = letterGrad;
ctx.fillText('S', cx, bodyTop + bodyH*0.42);
ctx.restore();

// === BOTTOM TEXT: "SCENT MATCH" ===
ctx.save();
ctx.font = '600 48px "Helvetica Neue", sans-serif';
ctx.textAlign = 'center';
ctx.letterSpacing = '8px';
ctx.fillStyle = 'rgba(240,230,176,0.7)';
ctx.fillText('SCENTMATCH', cx, H*0.92);
ctx.font = '300 28px "Helvetica Neue", sans-serif';
ctx.fillStyle = 'rgba(200,200,200,0.4)';
ctx.fillText('A I', cx, H*0.96);
ctx.restore();

// Helper: rounded rectangle
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

// === EXPORT ===
// Right-click canvas -> Save Image As... or use the download link
const link = document.createElement('a');
link.download = 'ScentMatch_AppIcon_1024.png';
link.href = c.toDataURL('image/png');
document.body.appendChild(document.createElement('br'));
const btn = document.createElement('button');
btn.textContent = 'Download 1024x1024 PNG';
btn.style.cssText = 'margin-top:20px;padding:12px 24px;background:#33A673;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer';
btn.onclick = () => link.click();
document.body.appendChild(btn);
</script>
</body>
</html>
